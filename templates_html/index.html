<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f7;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .header p {
            color: #666;
            font-size: 16px;
        }

        .badge {
            display: inline-block;
            background: #6366f1;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.06);
            margin-bottom: 24px;
        }

        .card h2 {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 16px;
        }

        textarea {
            width: 100%;
            height: 280px;
            border: 2px solid #e8e8ed;
            border-radius: 12px;
            padding: 16px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
            color: #333;
            line-height: 1.6;
        }

        textarea:focus {
            border-color: #6366f1;
        }

        textarea::placeholder {
            color: #aaa;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 16px;
        }

        .btn:hover {
            background: #5254cc;
            transform: translateY(-1px);
        }

        .btn:disabled {
            background: #a5a6f6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 32px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e8e8ed;
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading p {
            color: #666;
            font-size: 14px;
        }

        .results {
            display: none;
        }

        .score-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .score-circle {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #6366f1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .score-circle.pass { background: #10b981; }
        .score-circle.fail { background: #ef4444; }

        .score-info h3 {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
        }

        .score-info p {
            color: #666;
            font-size: 14px;
            margin-top: 4px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat {
            background: #f5f5f7;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .stat .number {
            font-size: 28px;
            font-weight: 700;
            color: #6366f1;
        }

        .stat .label {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .gaps {
            margin-bottom: 24px;
        }

        .gaps h3 {
            font-size: 14px;
            font-weight: 600;
            color: #ef4444;
            margin-bottom: 8px;
        }

        .gap-item {
            background: #fff5f5;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            color: #dc2626;
            margin-bottom: 6px;
        }

        .no-gaps {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            color: #16a34a;
        }

        .download-btn {
            width: 100%;
            padding: 16px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .download-btn:hover {
            background: #059669;
            transform: translateY(-1px);
        }

        .compliance {
            margin-bottom: 24px;
        }

        .compliance h3 {
            font-size: 14px;
            font-weight: 600;
            color: #d97706;
            margin-bottom: 8px;
        }

        .compliance-item {
            background: #fffbeb;
            border: 1px solid #fde68a;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            color: #92400e;
            margin-bottom: 6px;
        }

        .error {
            display: none;
            background: #fff5f5;
            border: 1px solid #fecaca;
            border-radius: 12px;
            padding: 16px;
            color: #dc2626;
            font-size: 14px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="badge">⚡ POWERED BY AI AGENTS</div>
            <h1>Campaign Agent</h1>
            <p>Paste a marketing brief. Get a campaign deck in seconds.</p>
        </div>

        <div class="card">
            <h2>📋 Paste your campaign brief</h2>
            <textarea 
                id="briefInput" 
                placeholder="Paste your raw campaign brief here...

Example:
Campaign Name: Summer Activation
Campaign Objective: Drive first purchase from new signups
Launch Date: Q3 2026
DRI: Lifecycle Marketing
..."></textarea>
            <button class="btn" onclick="runPipeline()" id="runBtn">
                ✨ Generate Campaign Deck
            </button>
            <div class="error" id="errorBox"></div>
        </div>

        <div class="loading" id="loadingBox">
            <div class="spinner"></div>
            <p id="loadingText">Extracting brief with AI...</p>
        </div>

        <div class="results card" id="resultsBox">
            <div class="score-bar">
                <div class="score-circle" id="scoreCircle">--</div>
                <div class="score-info">
                    <h3 id="campaignName">Campaign Name</h3>
                    <p id="scoreLabel">Evaluating...</p>
                </div>
            </div>

            <div class="stats">
                <div class="stat">
                    <div class="number" id="delivCount">0</div>
                    <div class="label">Deliverables</div>
                </div>
                <div class="stat">
                    <div class="number" id="segCount">0</div>
                    <div class="label">Segments</div>
                </div>
                <div class="stat">
                    <div class="number" id="scoreNum">0</div>
                    <div class="label">Eval Score</div>
                </div>
            </div>

            <div class="compliance" id="complianceBox"></div>
            <div class="gaps" id="gapsBox"></div>

            <a class="download-btn" href="/download-deck" target="_blank">
                📥 Download Campaign Deck
            </a>
        </div>
    </div>

    <script>
        const loadingMessages = [
            "Extracting brief with AI...",
            "Identifying segments and deliverables...",
            "Generating campaign deck...",
            "Running quality evaluation...",
            "Almost done..."
        ];

        let loadingInterval;

        async function runPipeline() {
            const briefText = document.getElementById('briefInput').value.trim();
            if (!briefText) {
                showError("Please paste a campaign brief first.");
                return;
            }

            // reset UI
            document.getElementById('runBtn').disabled = true;
            document.getElementById('errorBox').style.display = 'none';
            document.getElementById('resultsBox').style.display = 'none';
            document.getElementById('loadingBox').style.display = 'block';

            // cycle loading messages
            let msgIndex = 0;
            loadingInterval = setInterval(() => {
                msgIndex = (msgIndex + 1) % loadingMessages.length;
                document.getElementById('loadingText').textContent = loadingMessages[msgIndex];
            }, 3000);

            try {
                const response = await fetch('/run-pipeline', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ brief_text: briefText })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Something went wrong');
                }

                showResults(data);

            } catch (err) {
                showError(err.message);
            } finally {
                clearInterval(loadingInterval);
                document.getElementById('loadingBox').style.display = 'none';
                document.getElementById('runBtn').disabled = false;
            }
        }

        function showResults(data) {
            document.getElementById('resultsBox').style.display = 'block';
            document.getElementById('campaignName').textContent = data.campaign_name;
            document.getElementById('delivCount').textContent = data.deliverables_found;
            document.getElementById('segCount').textContent = data.segments_found;
            document.getElementById('scoreNum').textContent = data.eval_score;

            const circle = document.getElementById('scoreCircle');
            circle.textContent = data.eval_score;
            circle.className = 'score-circle ' + (data.eval_passed ? 'pass' : 'fail');

            document.getElementById('scoreLabel').textContent = data.eval_passed
                ? '✅ Passed quality check'
                : '❌ Needs review before launch';

            // compliance flags
            const compBox = document.getElementById('complianceBox');
            if (data.compliance_flags && data.compliance_flags.length > 0) {
                compBox.innerHTML = '<h3>⚠️ Compliance Flags</h3>' +
                    data.compliance_flags.map(f => `<div class="compliance-item">${f}</div>`).join('');
            } else {
                compBox.innerHTML = '';
            }

            // gaps
            const gapsBox = document.getElementById('gapsBox');
            if (data.eval_gaps && data.eval_gaps.length > 0) {
                gapsBox.innerHTML = '<h3>🔍 Gaps Found</h3>' +
                    data.eval_gaps.map(g => `<div class="gap-item">${g}</div>`).join('');
            } else {
                gapsBox.innerHTML = '<div class="no-gaps">✅ No gaps found — brief is complete!</div>';
            }
        }

        function showError(msg) {
            const box = document.getElementById('errorBox');
            box.textContent = '❌ ' + msg;
            box.style.display = 'block';
        }
    </script>
</body>
</html>
